"""
Docker compose configuration for local development with MLflow.
"""

version: '3.8'

services:
  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:////mlflow/mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - ./mlruns:/mlflow
    command: mlflow server --host 0.0.0.0 --backend-store-uri sqlite:////mlflow/mlflow.db

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: dockerfile
    container_name: sentiment-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/sentiment-model
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      - mlflow
    command: python -m uvicorn src.app.main:app --host 0.0.0.0 --port 8000

volumes:
  mlflow:
